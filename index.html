<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fast Mail Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 30px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px 36px 40px;
      width: 100%;
      max-width: 920px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09);
    }
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 32px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    input, textarea {
      width: 100%;
      padding: 16px 18px;
      border: 1.5px solid #dde3ed;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, textarea:focus { border-color: #4f7dff; }
    input::placeholder, textarea::placeholder { color: #b0bec5; }
    textarea { min-height: 150px; resize: vertical; line-height: 1.7; }
    .pass-wrap { position: relative; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 13px;
      color: #4f7dff; font-weight: 600;
    }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 6px;
    }
    .btn {
      padding: 17px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4f7dff;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #3a6aee; }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }
    .status {
      margin-top: 18px;
      padding: 13px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }
    .status.show    { display: block; }
    .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status.loading { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .progress-wrap { margin-top: 14px; display: none; }
    .progress-wrap.show { display: block; }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 13px; font-weight: 600; color: #64748b; }
    .progress-counter { font-size: 16px; font-weight: 800; color: #2563eb; }
    .progress-bar-bg {
      width: 100%; height: 8px;
      background: #e2e8f0; border-radius: 99px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4f7dff, #38bdf8);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .log-wrap { margin-top: 24px; display: none; }
    .log-wrap.show { display: block; }
    .log-title { font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: 1px; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f1f5f9; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { font-weight: 700; color: #64748b; font-size: 11px; letter-spacing: 0.8px; }
    .badge { border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 700; color: #fff; display: inline-block; }
    .badge.sent    { background: #16a34a; }
    .badge.failed  { background: #dc2626; }
    .badge.pending { background: #94a3b8; }
    .badge.sending { background: #2563eb; }
    .csv-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .btn-csv {
      background: #f1f5f9; border: 1.5px solid #dde3ed;
      color: #64748b; border-radius: 8px;
      padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 600;
    }
    .csv-name { font-size: 12px; color: #64748b; }
    @media (max-width: 620px) {
      .row, .btns { grid-template-columns: 1fr; }
      .card { padding: 24px 14px; }
    }
  </style>
</head>
<body>
<div class="card">

  <div class="title">Fast Mail Launcher</div>

  <div class="row">
    <input type="text"  id="senderName"   placeholder="Sender Name"  autocomplete="off" />
    <input type="email" id="gmailAddress" placeholder="Your Gmail"   autocomplete="off" />
  </div>

  <div class="row">
    <div class="pass-wrap">
      <input type="password" id="appPassword" placeholder="App Password" autocomplete="new-password" />
      <button class="eye-btn" id="eyeBtn" onclick="togglePass()">Show</button>
    </div>
    <input type="text" id="subject" placeholder="Subject" autocomplete="off" />
  </div>

  <div class="row">
    <textarea id="body"       placeholder="Message Body"                    autocomplete="off"></textarea>
    <div>
      <textarea id="recipients" placeholder="Recipients (comma or newline)" autocomplete="off"></textarea>
      <div class="csv-row">
        <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCSV(event)" />
        <button class="btn-csv" onclick="document.getElementById('csvFile').click()">Upload CSV</button>
        <span class="csv-name" id="csvName"></span>
      </div>
    </div>
  </div>

  <div class="btns">
    <button class="btn" id="sendBtn" onclick="sendEmails()">Send All</button>
    <button class="btn" onclick="clearAll()">Logout</button>
  </div>

  <div class="status" id="status"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Sending emails...</span>
      <span class="progress-counter" id="progressCounter">0/0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="log-wrap" id="logWrap">
    <div class="log-title">SEND LOG</div>
    <table>
      <thead>
        <tr><th>#</th><th>RECIPIENT</th><th>TIME</th><th>STATUS</th></tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

</div>
<script>
  function togglePass() {
    var i = document.getElementById('appPassword');
    var b = document.getElementById('eyeBtn');
    if (i.type === 'password') { i.type = 'text'; b.textContent = 'Hide'; }
    else { i.type = 'password'; b.textContent = 'Show'; }
  }

  function parseRecipients(text) {
    return text.split(/[\n,]+/)
      .map(function(e) { return e.trim(); })
      .filter(function(e) { return e.indexOf('@') > -1; });
  }

  function handleCSV(e) {
    var file = e.target.files[0];
    if (!file) return;
    document.getElementById('csvName').textContent = file.name;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var lines = ev.target.result.split('\n').slice(1);
      var emails = lines
        .map(function(l) { return l.split(',')[0] ? l.split(',')[0].trim() : ''; })
        .filter(function(e) { return e && e.indexOf('@') > -1; });
      document.getElementById('recipients').value = emails.join('\n');
      showStatus('CSV loaded: ' + emails.length + ' recipients', 'success');
    };
    reader.readAsText(file);
  }

  function clearAll() {
    ['senderName','gmailAddress','appPassword','subject','body','recipients'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('csvName').textContent = '';
    document.getElementById('status').className = 'status';
    document.getElementById('logWrap').className = 'log-wrap';
    document.getElementById('logBody').innerHTML = '';
    document.getElementById('progressWrap').className = 'progress-wrap';
    document.getElementById('progressBar').style.width = '0%';
  }

  function showStatus(msg, type) {
    var s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status ' + type + ' show';
  }

  function setProgress(done, total) {
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressCounter').textContent = done + '/' + total;
    document.getElementById('progressLabel').textContent = done >= total ? 'Done!' : 'Sending emails...';
  }

  async function sendEmails() {
    var gmailAddress = document.getElementById('gmailAddress').value.trim();
    var appPassword  = document.getElementById('appPassword').value.trim();
    var senderName   = document.getElementById('senderName').value.trim();
    var subject      = document.getElementById('subject').value.trim();
    var body         = document.getElementById('body').value.trim();
    var recipients   = parseRecipients(document.getElementById('recipients').value);

    if (!gmailAddress || !appPassword) return showStatus('Gmail and App Password required!', 'error');
    if (!recipients.length)            return showStatus('Add at least one recipient!', 'error');
    if (!subject || !body)             return showStatus('Subject and Body required!', 'error');

    var btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    document.getElementById('progressWrap').className = 'progress-wrap show';
    setProgress(0, recipients.length);
    showStatus('Sending ' + recipients.length + ' emails...', 'loading');

    var logBody = document.getElementById('logBody');
    document.getElementById('logWrap').className = 'log-wrap show';
    logBody.innerHTML = recipients.map(function(email, i) {
      return '<tr id="row-' + i + '">' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + email + '</td>' +
        '<td id="time-' + i + '">--</td>' +
        '<td><span class="badge pending" id="badge-' + i + '">Pending</span></td>' +
        '</tr>';
    }).join('');

    var sentCount = 0;
    var failCount = 0;

    for (var i = 0; i < recipients.length; i++) {
      var email = recipients[i];
      var badge = document.getElementById('badge-' + i);
      var timeCell = document.getElementById('time-' + i);

      badge.className = 'badge sending';
      badge.textContent = 'Sending...';
      timeCell.textContent = new Date().toLocaleTimeString();

      try {
        var res = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            gmailAddress: gmailAddress,
            appPassword: appPassword,
            to: email,
            subject: subject,
            body: body,
            senderName: senderName
          })
        });

        var data = await res.json();

        if (data.status === 'sent') {
          badge.className = 'badge sent';
          badge.textContent = 'Sent';
          sentCount++;
        } else {
          badge.className = 'badge failed';
          badge.textContent = 'Failed';
          failCount++;
        }
      } catch (err) {
        badge.className = 'badge failed';
        badge.textContent = 'Failed';
        failCount++;
      }

      setProgress(i + 1, recipients.length);
      showStatus(
        'Sending... ' + (i + 1) + '/' + recipients.length +
        ' | Sent: ' + sentCount + ' | Failed: ' + failCount,
        'loading'
      );
    }

    setProgress(recipients.length, recipients.length);
    if (failCount === 0) {
      showStatus('All ' + sentCount + '/' + recipients.length + ' emails sent!', 'success');
    } else {
      showStatus('Done! Sent: ' + sentCount + ' | Failed: ' + failCount + ' | Total: ' + recipients.length, sentCount > 0 ? 'success' : 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Send All';
  }
</script>
</body>
</html>
